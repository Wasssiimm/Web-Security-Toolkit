name: Build, Push, and Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOY_PATH: /home/${{ secrets.SERVER_USER }}/${{ github.event.repository.name }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push node image
        uses: docker/build-push-action@v5
        with:
          context: ./server-node
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/crucex-node:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/crucex-node:${{ github.sha }}

      - name: Build and push python image
        uses: docker/build-push-action@v5
        with:
          context: ./server-python
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/crucex-python:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/crucex-python:${{ github.sha }}

      - name: Build and push caddy/frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          build-args: |
            VITE_UMAMI_WEBSITE_ID=${{ secrets.VITE_UMAMI_WEBSITE_ID }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/crucex-caddy:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/crucex-caddy:${{ github.sha }}

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          source: "docker-compose.yml"
          target: "${{ env.DEPLOY_PATH }}/"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@823bd89e131d8d508129f9443cad5855e9ba96f0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          envs: DOCKERHUB_USERNAME,IMAGE_TAG
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}
            # .env (DOCKERHUB_USERNAME, INTERNAL_API_TOKEN, etc.) lives here already —
            # created once by hand on the server, never touched by this workflow.
            export IMAGE_TAG=$IMAGE_TAG
            docker compose pull

            # docker compose up can transiently fail with "removal of container
            # ... is already in progress" when recreating a container hits a
            # Docker-engine race — the underlying operation usually still
            # converges correctly a moment later. Retry a couple of times
            # instead of treating one flaky exit code as a real failure.
            up_ok=false
            for i in 1 2 3; do
              if docker compose up -d --remove-orphans; then
                up_ok=true
                break
              fi
              echo "docker compose up failed (attempt $i/3), retrying in 5s..."
              sleep 5
            done
            if [ "$up_ok" != true ]; then
              echo "docker compose up kept failing after 3 attempts — treating as a real failure."
              docker compose down || true
              IMAGE_TAG=stable docker compose up -d --remove-orphans
              sleep 5
              docker compose ps
              exit 1
            fi

            echo "Waiting for node + python to become healthy..."
            healthy() {
              [ "$(docker inspect --format='{{.State.Health.Status}}' crucex-node 2>/dev/null)" = "healthy" ] && \
              [ "$(docker inspect --format='{{.State.Health.Status}}' crucex-python 2>/dev/null)" = "healthy" ]
            }
            for i in $(seq 1 12); do
              if healthy; then break; fi
              echo "Not healthy yet (attempt $i/12)..."
              sleep 5
            done

            if ! healthy; then
              echo "Services never became healthy, rolling back to :stable..."
              docker compose down || true
              IMAGE_TAG=stable docker compose up -d --remove-orphans
              sleep 5
              docker compose ps
              exit 1
            fi

            echo "Deploy healthy."
            docker compose ps

      - name: Tag current images as stable
        if: success()
        run: |
          for svc in node python caddy; do
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/crucex-$svc:${{ github.sha }}
            docker tag ${{ secrets.DOCKERHUB_USERNAME }}/crucex-$svc:${{ github.sha }} \
                       ${{ secrets.DOCKERHUB_USERNAME }}/crucex-$svc:stable
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/crucex-$svc:stable
          done
